[build]
  command = "npm run build"
  publish = "dist"

# Proxy all API calls to your backend (update this to your Render API URL).
[[redirects]]
  from = "/api/*"
  to = "https://arirang.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
